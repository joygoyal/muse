<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Muse is a romantic interactive music story built with Flask.">
  <title>{% block title %}Muse{% endblock %}</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=9">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="loader" data-loader>
    <div class="loader-vinyl"></div>
    <p>Loading Muse</p>
  </div>

  <div class="cursor-dot" data-cursor-dot></div>
  <div class="cursor-ring" data-cursor-ring></div>
  <canvas class="particle-canvas" data-particles aria-hidden="true"></canvas>
  <div class="floating-notes" aria-hidden="true">
    <span>♪</span><span>♫</span><span>♩</span><span>♥</span><span>♪</span>
  </div>

  <header class="site-header">
    <a class="brand" href="{{ url_for('main.index') }}" aria-label="Muse home">
      <span class="brand-mark"><i class="fa-solid fa-record-vinyl"></i></span>
      <span>{{ settings.site_name }}</span>
    </a>
    <nav class="main-nav" aria-label="Primary navigation">
      <a href="{{ url_for('main.story') }}">Story</a>
      <a href="{{ url_for('main.playlist') }}">Playlist</a>
      <a href="{{ url_for('main.puzzle') }}">Puzzle</a>
      <a href="{{ url_for('main.secret') }}">Secret</a>
    </nav>
    <button class="icon-button" data-theme-toggle aria-label="Toggle dark mode" title="Toggle dark mode">
      <i class="fa-solid fa-moon"></i>
    </button>
  </header>

  <main class="page-shell" data-page>
    {% block content %}{% endblock %}
  </main>

  <div class="modal" data-modal aria-hidden="true">
    <div class="modal-backdrop" data-modal-close></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="icon-button modal-close" data-modal-close aria-label="Close modal" title="Close">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div data-modal-content></div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.12/dist/lottie-player.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}?v=9"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
